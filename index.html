<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon: a Novice head sprite rendered by ragassets, downloaded into
         public/ so the icon doesn't depend on that service being reachable. -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Simulador de Visuais — Ragnarok LATAM</title>
    <meta
      name="description"
      content="Monte o visual do seu personagem do Ragnarok Online LATAM: classe, cabelo, cores e os 4 slots de visual."
    />
    <!-- Resolve the saved theme before first paint to avoid a flash. Mirrors
         src/theme.ts: "auto"/missing follows the OS scheme, else it's forced. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("theme");
          var dark =
            pref === "dark" ||
            ((pref === null || pref === "auto") &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
